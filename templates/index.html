<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ITZ-DEV ELITE CORE</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root { --cyber: #00d4ff; --bg: #0d1117; --card: #161b22; --text: #e6edf3; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .cyber-card { background: var(--card); border: 1px solid #30363d; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .nav-link { color: #8b949e; font-weight: bold; font-size: 0.75rem; border: none !important; text-transform: uppercase; padding: 12px 5px; transition: 0.3s; }
        .nav-link.active { background: var(--cyber) !important; color: #0d1117 !important; border-radius: 8px; box-shadow: 0 0 10px var(--cyber); }
        .terminal { background: #010409; color: var(--cyber); height: 250px; overflow-y: auto; padding: 12px; border-radius: 10px; font-size: 0.75rem; border: 1px solid #30363d; font-family: 'Courier New', monospace; scroll-behavior: smooth; }
        .form-control, .form-select { background: #0d1117 !important; color: var(--cyber) !important; border: 1px solid #30363d !important; font-size: 0.9rem; padding: 10px; border-radius: 8px; }
        .btn-cyber { background: var(--cyber); color: #0d1117; font-weight: 800; border: none; border-radius: 8px; font-size: 0.85rem; padding: 12px; text-transform: uppercase; transition: 0.2s; }
        .btn-stop { background: #f85149; color: #fff; font-weight: 800; border: none; border-radius: 8px; font-size: 0.85rem; padding: 12px; text-transform: uppercase; }
        label { color: var(--cyber); font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; display: block; letter-spacing: 0.5px; }
        .badge-acc { background: #238636; color: #fff; padding: 5px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: bold; }
        .badge-exp { background: #f85149; color: #fff; padding: 5px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container py-3">
    <div class="text-center mb-3">
        <h5 style="color: var(--cyber); text-shadow: 0 0 8px var(--cyber); font-weight: 800;">ITZ-DEV COMMAND MATRIX</h5>
        <div class="d-flex justify-content-center gap-2 mb-2">
            <span class="badge-acc">SESSIONS: {{ stats.active }}</span>
            <span class="badge-exp">EXPIRED: {{ stats.expired }}</span>
            <span class="badge bg-success" style="font-size: 0.75rem;">PROXY OK: {{ stats.p_active }}</span>
            <span class="badge bg-danger" style="font-size: 0.75rem;">PROXY DEAD: {{ stats.p_dead }}</span>
        </div>
    </div>

    <ul class="nav nav-pills nav-justified mb-3">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-rep">Report</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-ref">Refer</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-msg">Msg</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-grp">Group</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-otp" style="color:#e3b341;">OTP Bot</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-set">Set</button></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="tab-rep">
            <div class="cyber-card">
                <label>Strategy</label>
                <select class="form-select mb-3" id="r-strat" onchange="document.getElementById('r-post-box').className=this.value==='posts'?'':'d-none'">
                    <option value="direct">Direct Peer Report</option>
                    <option value="posts">Specific Post Attack</option>
                    <option value="bot">Bot (Start & Report)</option>
                </select>
                <label>Target</label>
                <input type="text" class="form-control mb-2" id="r-target" placeholder="https://t.me/Target">
                <div class="form-check mb-3 mt-2"><input class="form-check-input" type="checkbox" id="r-join" checked><label>JOIN BEFORE REPORTING</label></div>
                <div id="r-post-box" class="d-none mb-3"><label>Post URLs</label><textarea class="form-control" id="r-posts" rows="3"></textarea></div>
                <div class="cyber-card mt-2 mb-3" style="border-style: dashed; border-color: #30363d; background: #010409;">
                    <div class="form-check form-switch mb-2"><input class="form-check-input" type="checkbox" id="leave-after"><label>EXECUTE TACTICAL LEAVE (ANTI-BAN)</label></div>
                    <label>LEAVE DELAY (Seconds)</label><input type="number" class="form-control" id="leave-delay" value="300">
                </div>
                <div class="row g-2 mb-4">
                    <div class="col-6"><label>Accounts</label><input type="number" class="form-control" id="r-acc" value="{{ stats.active }}"></div>
                    <div class="col-6"><label>Reason</label><select class="form-select" id="r-reason"><option value="4">Child Abuse</option><option value="3">Pornography</option><option value="1">Spam</option><option value="8">Scam</option></select></div>
                </div>
                <div class="d-flex gap-2"><button class="btn btn-cyber w-75 launch-btn" onclick="fire('report', this)">INITIALIZE ATTACK</button><button class="btn btn-stop w-25" onclick="stop()">ABORT</button></div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-ref">
            <div class="cyber-card">
                <label>Referral Link</label><input type="text" class="form-control mb-3" id="ref-target" placeholder="https://t.me/Bot?start=123">
                <label>Accounts</label><input type="number" class="form-control mb-4" id="ref-acc" value="{{ stats.active }}">
                <div class="d-flex gap-2"><button class="btn btn-cyber w-75 launch-btn" onclick="fire('refer', this)">EXECUTE REFERRALS</button><button class="btn btn-stop w-25" onclick="stop()">ABORT</button></div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-msg">
            <div class="cyber-card">
                <label>Receiver</label><input type="text" class="form-control mb-3" id="m-target">
                <label>Message</label><textarea class="form-control mb-3" id="m-text" rows="3"></textarea>
                <label>Accounts</label><input type="number" class="form-control mb-4" id="m-acc" value="{{ stats.active }}">
                <div class="d-flex gap-2"><button class="btn btn-cyber w-75 launch-btn" onclick="fire('message', this)">TRANSMIT MSG</button><button class="btn btn-stop w-25" onclick="stop()">ABORT</button></div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-grp">
            <div class="cyber-card">
                <label>Target Channel/Group</label><input type="text" class="form-control mb-4" id="t-target">
                <label>Accounts</label><input type="number" class="form-control mb-4" id="t-acc" value="{{ stats.active }}">
                <div class="row g-2 mb-3"><div class="col-6"><button class="btn btn-cyber w-100 launch-btn" onclick="fire('join', this)">MASS JOIN</button></div><div class="col-6"><button class="btn btn-stop w-100" onclick="fire('leave', null)">MASS LEAVE</button></div></div>
                <button class="btn btn-outline-info w-100 py-3 mt-2 launch-btn" onclick="fire('health', this)">API HEALTH AUDIT</button>
                <button class="btn btn-outline-warning w-100 py-3 mt-2" onclick="checkProxies(this)">VERIFY PROXY INTEGRITY</button>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-otp">
            <div class="cyber-card">
                <h6 style="color: #e3b341; text-align: center; font-weight: bold;">WEBHOOK OTP PROTOCOL</h6>
                <div class="text-center mb-4 mt-3"><span class="badge {{ 'bg-success' if bot_running else 'bg-danger' }} p-2">STATE: {{ 'LISTENING' if bot_running else 'OFFLINE' }}</span></div>
                <label>Bot Token</label><input type="text" class="form-control mb-2" id="bot-token" value="{{ bot_token }}">
                <button class="btn btn-outline-info w-100 mb-4" onclick="saveBotToken(this)">COMMIT TOKEN</button>
                <div class="cyber-card" style="border: 1px solid #444; background: #010409;">
                    <label class="text-center w-100 mb-3" style="color:#8b949e;">WEBHOOK DIRECTIVES</label>
                    <button class="btn btn-cyber w-100 py-2 mb-2" onclick="initBotEngine(this)">1. INIT ENGINE</button>
                    <button class="btn btn-outline-success w-100 py-2 mb-2" onclick="setWebhook(this)">2. BIND WEBHOOK</button>
                    <button class="btn btn-outline-danger w-100 py-2" onclick="removeWebhook(this)">3. DELETE WEBHOOK</button>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-set">
            <div class="cyber-card">
                <h6 style="color: var(--cyber); text-align: center; font-weight: bold;">OPERATION PARAMETERS</h6>
                <div class="row g-2 mb-4"><div class="col-4"><label>Min(s)</label><input type="number" class="form-control" id="min-d" value="5"></div><div class="col-4"><label>Max(s)</label><input type="number" class="form-control" id="max-d" value="15"></div><div class="col-4"><label>Bot(s)</label><input type="number" class="form-control" id="bot-w" value="60"></div></div>
                <hr style="border-color: #30363d;">
                <label>Inject .Session Files</label><input type="file" id="up-f" multiple class="form-control mb-2"><button class="btn btn-cyber w-100 mb-4" onclick="upSess(this)">UPLOAD PAYLOAD</button>
                <a href="/download_sessions" class="btn btn-outline-info w-100 mb-4 py-2">EXTRACT SESSIONS (ZIP)</a>
                <label>Proxy Config (SOCKS5)</label><textarea class="form-control mb-2" id="px-t" rows="4">{{ proxies }}</textarea><button class="btn btn-cyber w-100 mb-4" onclick="upProx(this)">COMMIT PROXIES</button>
                <label>API Key Pool</label><input type="text" id="api-id" class="form-control mb-2" placeholder="API ID"><input type="text" id="api-hash" class="form-control mb-3" placeholder="API HASH"><button class="btn btn-cyber w-100 mb-4" onclick="upCred(this)">INJECT KEY</button>
            </div>
        </div>
    </div>

    <div class="mt-2 mb-4">
        <label>SYSTEM OUTPUT CONSOLE</label>
        <div class="terminal" id="log"></div>
    </div>
</div>

<script>
    async function fire(action, btn) {
        if (btn) btn.innerText = "EXECUTING...";
        let p = { action: action, min_d: document.getElementById('min-d').value, max_d: document.getElementById('max-d').value, bot_w: document.getElementById('bot-w').value };
        if(action === 'report') {
            p.report_mode = document.getElementById('r-strat').value; p.target = document.getElementById('r-target').value; p.post_links = document.getElementById('r-posts').value.split('\n'); p.reason = document.getElementById('r-reason').value; p.acc_limit = document.getElementById('r-acc').value; p.join_first = document.getElementById('r-join').checked; p.leave_after = document.getElementById('leave-after').checked; p.leave_delay = document.getElementById('leave-delay').value;
        } else if(action === 'refer') { p.target = document.getElementById('ref-target').value; p.acc_limit = document.getElementById('ref-acc').value;
        } else if(action === 'message') { p.target = document.getElementById('m-target').value; p.message_text = document.getElementById('m-text').value; p.acc_limit = document.getElementById('m-acc').value;
        } else { p.acc_limit = document.getElementById('t-acc').value; p.target = document.getElementById('t-target').value; }
        let res = await fetch('/execute', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(p)});
        if (btn) setTimeout(() => btn.innerText = "DONE", 1500);
    }
    async function stop() { await fetch('/stop', {method: 'POST'}); }
    async function checkProxies(btn) { btn.innerText = "VERIFYING..."; await fetch('/check_proxies', {method: 'POST'}); setTimeout(() => location.reload(), 5000); }
    async function upSess(btn) { btn.innerText = "UPLOADING..."; let fd = new FormData(); for(let f of document.getElementById('up-f').files) fd.append('files', f); await fetch('/upload_sessions', {method: 'POST', body: fd}); location.reload(); }
    async function upProx(btn) { await fetch('/save_proxies', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({proxies: document.getElementById('px-t').value})}); btn.innerText="SAVED"; }
    async function upCred(btn) { await fetch('/save_creds', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({api_id: document.getElementById('api-id').value, api_hash: document.getElementById('api-hash').value})}); btn.innerText="ADDED"; }
    async function saveBotToken(btn) { await fetch('/api/bot/save', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({token: document.getElementById('bot-token').value})}); btn.innerText="COMMITTED"; }
    async function initBotEngine(btn) { await fetch('/api/bot/init_engine', {method: 'POST'}); setTimeout(() => location.reload(), 1500); }
    async function setWebhook(btn) { let res = await fetch('/api/bot/set_webhook', {method: 'POST'}); let j = await res.json(); alert(j.ok ? "Success" : "Error"); }
    async function removeWebhook(btn) { await fetch('/api/bot/remove_webhook', {method: 'POST'}); alert("Removed"); }

    const src = new EventSource("/logs");
    src.onmessage = (e) => {
        const l = document.getElementById('log');
        if(e.data.startsWith('INIT|')) { l.innerHTML = e.data.substring(5).split('<br>').map(x => `<div>${x}</div>`).join(''); }
        else if(e.data.startsWith('APP|')) { l.insertAdjacentHTML('beforeend', `<div>${e.data.substring(4)}</div>`); }
        l.scrollTop = l.scrollHeight;
    };
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
